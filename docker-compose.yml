version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: info-nitro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: info-nitro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - info-nitro-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: info-nitro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/info-nitro
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      - postgres
    networks:
      - info-nitro-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: info-nitro-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - info-nitro-network

volumes:
  postgres_data:

networks:
  info-nitro-network:
    driver: bridge
